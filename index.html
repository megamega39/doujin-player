<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){
        try {
          var s = localStorage.getItem('language-store');
          if (s) {
            var d = JSON.parse(s);
            if (d && d.state && d.state.locale === 'en') {
              document.documentElement.lang = 'en';
            }
          }
        } catch(e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>同人音声プレイヤー</title>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
